name: Reusable Docker Buildscript
on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      label:
        required: false
        default: "latest"
        type: string
      path:
        required: false
        default: "./"
        type: string
      owner:
        required: true
        type: string
      push:
        required: false
        default: true
        type: boolean
      registry:
        required: false
        default: "ghcr.io"
        type: string
      platforms:
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
      rotate:
        required: false
        default: true
        type: boolean
concurrency:
  group: docker-${{ inputs.owner }}-${{ inputs.name }}
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log into GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ inputs.registry }}/${{ inputs.owner }}/${{ inputs.name }}
          tags: |
            type=raw,value=${{ inputs.label }}
            type=raw,value=latest
      - name: Build and push multi-platform image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ inputs.path }}
          file: ${{ inputs.path }}/Dockerfile
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ inputs.platforms }}
      - name: Delete old images
        if: ${{ inputs.push && inputs.rotate }}
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          keep-n-untagged: 1
          keep-n-tagged: 2
          exclude-tags: latest
          package: ${{ inputs.name }}
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
